<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSP - Teori Graf</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="tsp.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <circle cx="8" cy="8" r="4" fill="currentColor"/>
                <circle cx="24" cy="8" r="4" fill="currentColor"/>
                <circle cx="16" cy="24" r="4" fill="currentColor"/>
                <line x1="8" y1="8" x2="24" y2="8" stroke="currentColor" stroke-width="2"/>
                <line x1="8" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="2"/>
                <line x1="24" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Teori Graf Visualizer</span>
        </div>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">
                <span class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M6 20v-6"/>
                        <path d="M12 20V8"/>
                        <path d="M18 20V4"/>
                    </svg>
                </span>
                Graf Visualizer
            </a>
            <a href="islands.html" class="nav-tab">
                <span class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 21s-6-4.35-6-10a6 6 0 1 1 12 0c0 5.65-6 10-6 10z"/>
                        <circle cx="12" cy="11" r="2.5"/>
                    </svg>
                </span>
                Island Counter
            </a>
            <a href="tsp.html" class="nav-tab active">
                <span class="tab-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="6" cy="6" r="2"/>
                        <circle cx="18" cy="6" r="2"/>
                        <circle cx="12" cy="18" r="2"/>
                        <path d="M8 6h8"/>
                        <path d="M17 7.5l-4 8"/>
                        <path d="M7 7.5l4 8"/>
                    </svg>
                </span>
                TSP
            </a>
        </div>
        <div class="nav-info">
            <span>Tugas Teori Graf</span>
            <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="Aktifkan dark mode" title="Aktifkan dark mode">
                <span class="theme-text">Dark Mode</span>
            </button>
        </div>
    </nav>

    <div class="app-container tsp-app">
        <aside class="sidebar tsp-sidebar">
            <div class="panel">
                <h3>Tools</h3>
                <div class="tools-grid tsp-tools-grid">
                    <button id="addNodeTool" class="tool-btn active" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="8"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <span>Simpul</span>
                    </button>
                    <button id="moveTool" class="tool-btn" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>
                        </svg>
                        <span>Pindah</span>
                    </button>
                    <button id="deleteTool" class="tool-btn" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                        <span>Hapus</span>
                    </button>
                </div>
            </div>

            <div class="panel">
                <h3>Input Test</h3>
                <div class="preset-control">
                    <label class="preset-label" for="graphPresetSelect">Kelas Graf</label>
                    <select id="graphPresetSelect" class="preset-select">
                        <option value="complete">Graf lengkap K_n</option>
                        <option value="completeBipartite">Graf bipartit lengkap K_m,n</option>
                        <option value="tree">Pohon T_n</option>
                        <option value="cycle">Siklus C_n</option>
                        <option value="path">Lintasan P_n</option>
                        <option value="wheel">Graf roda W_n</option>
                        <option value="prism">Graf prisma</option>
                        <option value="petersen">Petersen graph</option>
                        <option value="generalizedPetersen">Generalized Petersen P(n,k)</option>
                        <option value="circulant">Circulant graph C_n(a1,a2)</option>
                        <option value="hypercube">Hypercube H(n)</option>
                        <option value="grid">Grid graph G(m,n)</option>
                    </select>
                    <div class="preset-params">
                        <label class="preset-field" data-param="n">
                            <span id="presetNLabel">n</span>
                            <input id="presetN" type="number" min="1" max="20" value="6">
                        </label>
                        <label class="preset-field" data-param="m">
                            <span id="presetMLabel">m</span>
                            <input id="presetM" type="number" min="1" max="20" value="3">
                        </label>
                        <label class="preset-field" data-param="k">
                            <span id="presetKLabel">k</span>
                            <input id="presetK" type="number" min="1" max="10" value="2">
                        </label>
                        <label class="preset-field" data-param="a1">
                            <span id="presetA1Label">a1</span>
                            <input id="presetA1" type="number" min="1" max="10" value="1">
                        </label>
                        <label class="preset-field" data-param="a2">
                            <span id="presetA2Label">a2</span>
                            <input id="presetA2" type="number" min="1" max="10" value="3">
                        </label>
                    </div>
                    <button id="loadPresetGraph" class="action-btn preset-load-btn" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                        Muat Graf
                    </button>
                    <p id="presetHint" class="preset-hint"></p>
                </div>
            </div>

            <div class="panel">
                <h3>Operasi TSP</h3>
                <button id="solveTspBtn" class="btn btn-accent btn-full tsp-run-btn" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="6" cy="6" r="2"/>
                        <circle cx="18" cy="6" r="2"/>
                        <circle cx="12" cy="18" r="2"/>
                        <path d="M8 6h8"/>
                        <path d="M17 7.5l-4 8"/>
                        <path d="M7 7.5l4 8"/>
                    </svg>
                    Jalankan TSP
                </button>
                <div class="tsp-speed-control">
                    <div class="tsp-speed-header">
                        <label for="tspSpeedSlider">Kecepatan Animasi</label>
                        <span id="tspSpeedValue">1x</span>
                    </div>
                    <input type="range" id="tspSpeedSlider" min="0.25" max="3" value="1" step="0.25">
                    <div class="tsp-speed-labels">
                        <span>Lambat</span>
                        <span>Cepat</span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>Aksi</h3>
                <div class="action-buttons">
                    <button id="clearGraph" class="action-btn danger" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        Hapus Semua
                    </button>
                    <button id="resetRoute" class="action-btn" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                        Reset Rute
                    </button>
                    <button id="importTxt" class="action-btn" type="button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
                        Import TXT
                    </button>
                </div>
            </div>

            <div class="panel tsp-result-panel" id="tspResultPanel">
                <h3>Hasil</h3>
                <div class="tsp-result-list">
                    <div class="tsp-result-item">
                        <span>Total Jarak</span>
                        <strong id="resultDistance">-</strong>
                    </div>
                    <div class="tsp-result-item">
                        <span>Simpul Rute</span>
                        <strong id="resultNodes">-</strong>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content tsp-main">
            <div class="top-bar tsp-top-bar">
                <div class="graph-info">
                    <div class="info-item">
                        <span class="info-label">Simpul:</span>
                        <span id="nodeCount" class="info-value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Sisi Lengkap:</span>
                        <span id="edgeCount" class="info-value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Mode:</span>
                        <span id="currentMode" class="info-value">Tambah Simpul</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Jarak Tur:</span>
                        <span id="tourDistance" class="info-value">-</span>
                    </div>
                </div>
            </div>

            <div class="canvas-container tsp-canvas-container" id="canvasContainer">
                <canvas id="tspCanvas"></canvas>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="result-modal">
            <button class="modal-close-btn" id="closeResultModal" type="button">&times;</button>
            <div class="result-modal-content" id="resultModalContent"></div>
        </div>
    </div>

    <input type="file" id="txtFileInput" accept=".txt" style="display: none;">

    <script src="tsp.js"></script>
</body>
</html>
