<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualizer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <circle cx="8" cy="8" r="4" fill="currentColor"/>
                <circle cx="24" cy="8" r="4" fill="currentColor"/>
                <circle cx="16" cy="24" r="4" fill="currentColor"/>
                <line x1="8" y1="8" x2="24" y2="8" stroke="currentColor" stroke-width="2"/>
                <line x1="8" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="2"/>
                <line x1="24" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Teori Graf Visualizer</span>
        </div>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab active">
                <span class="tab-icon">📊</span>
                Graf Visualizer
            </a>
            <a href="islands.html" class="nav-tab">
                <span class="tab-icon">🏝️</span>
                Island Counter
            </a>
        </div>
        <div class="nav-info">
            <span>Tugas Teori Graf</span>
            <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="Aktifkan dark mode" title="Aktifkan dark mode">
                <span class="theme-text">Dark Mode</span>
            </button>
        </div>
    </nav>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Graph Type -->
            <div class="panel">
                <h3>Tipe Graf</h3>
                <div class="toggle-container">
                    <button id="undirectedBtn" class="toggle-btn active">Undirected</button>
                    <button id="directedBtn" class="toggle-btn">Directed</button>
                </div>
            </div>

            <!-- Tools -->
            <div class="panel">
                <h3>Tools</h3>
                <div class="tools-grid">
                    <button id="addNodeTool" class="tool-btn active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="8"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <span>Simpul</span>
                    </button>
                    <button id="addEdgeTool" class="tool-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="5" x2="19" y2="19"/>
                            <circle cx="5" cy="5" r="3"/>
                            <circle cx="19" cy="19" r="3"/>
                        </svg>
                        <span>Sisi</span>
                    </button>
                    <button id="moveTool" class="tool-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>
                        </svg>
                        <span>Pindah</span>
                    </button>
                    <button id="deleteTool" class="tool-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                        <span>Hapus</span>
                    </button>
                </div>
            </div>

            <!-- Operations -->
            <div class="panel">
                <h3>Operasi Graf</h3>
                <div class="operations-list">
                    <button id="opDFS" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19V5m0 0L5 11m6-6l6 6"/></svg></span>DFS Traversal
                    </button>
                    <button id="opBFS" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></span>BFS Traversal
                    </button>
                    <button id="opDistance" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h20M12 2l4 4-4 4"/><circle cx="4" cy="12" r="2"/><circle cx="20" cy="12" r="2"/></svg></span>Jarak Antar Simpul
                    </button>
                    <button id="opConnected" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></span>Cek Keterhubungan
                    </button>
                    <button id="opComponentSize" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>Ukuran Komponen
                    </button>
                    <button id="opCountComponents" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="18" r="3"/></svg></span>Jumlah Komponen
                    </button>
                    <button id="opLargestComponent" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>Komponen Terbesar
                    </button>
                    <button id="opBipartite" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="4"/><circle cx="17" cy="17" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg></span>Cek Bipartite
                    </button>
                    <button id="opDiameter" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg></span>Diameter Graf
                    </button>
                    <button id="opCycle" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.22-8.56"/><path d="M21 3v6h-6"/></svg></span>Deteksi Siklus
                    </button>
                    <button id="opGirth" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg></span>Girth (Sabuk)
                    </button>
                    <button id="opShortestPath" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19l5-14"/><path d="M14 19l5-14"/><path d="M3 14h8"/><path d="M13 10h8"/></svg></span>Lintasan Terpendek
                    </button>
                    <button id="opMST" class="op-btn">
                        <span class="op-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M7 7.2l3.2 8"/><path d="M17 7.2l-3.2 8"/></svg></span>Pohon Pembangun Minimal
                    </button>
                </div>
            </div>

            <!-- Actions -->
            <div class="panel">
                <h3>Aksi</h3>
                <div class="action-buttons">
                    <button id="clearGraph" class="action-btn danger">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        Hapus Semua
                    </button>
                    <button id="resetColors" class="action-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                        Reset Warna
                    </button>
                    <button id="exportTxt" class="action-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        Export TXT
                    </button>
                    <button id="importTxt" class="action-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
                        Import TXT
                    </button>
                </div>
            </div>

            <!-- Speed Control -->
            <div class="panel">
                <h3>Kecepatan Animasi</h3>
                <div class="speed-control">
                    <input type="range" id="speedSlider" min="100" max="2000" value="500" step="100">
                    <div class="speed-labels">
                        <span>Cepat</span>
                        <span id="speedValue">500ms</span>
                        <span>Lambat</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="graph-info">
                    <div class="info-item">
                        <span class="info-label">Simpul:</span>
                        <span id="nodeCount" class="info-value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Sisi:</span>
                        <span id="edgeCount" class="info-value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Mode:</span>
                        <span id="currentMode" class="info-value">Tambah Simpul</span>
                    </div>
                </div>
                
                <!-- View Toggle -->
                <div class="view-toggle-container">
                    <button id="view2DBtn" class="view-toggle-btn active">
                        <span class="toggle-icon">📊</span>
                        <span>2D View</span>
                    </button>
                    <button id="view3DBtn" class="view-toggle-btn">
                        <span class="toggle-icon">🌐</span>
                        <span>3D View</span>
                    </button>
                </div>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <!-- 2D Canvas -->
                <canvas id="graphCanvas"></canvas>
                
                <!-- 3D Container (inline, not modal) -->
                <div class="canvas-3d-container" id="canvas3DContainer">
                    <div id="threejs-inline-container"></div>
                    
                    <!-- 3D Controls -->
                    <div class="view-3d-controls">
                        <button class="control-btn" id="resetCamera3D" title="Reset Camera">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 4v6h6M23 20v-6h-6"/>
                                <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                            </svg>
                        </button>
                        <button class="control-btn active" id="toggleAutoRotate3D" title="Auto Rotate">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12a9 9 0 11-6.219-8.56"/>
                            </svg>
                        </button>
                        <button class="control-btn" id="toggleWireframe3D" title="Wireframe">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- 3D Info -->
                    <div class="view-3d-info-inline">
                        <p>🖱️ <strong>Drag</strong> untuk memutar</p>
                        <p>🔍 <strong>Scroll</strong> untuk zoom</p>
                        <p>➡️ <strong>Right-click</strong> untuk pan</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="result-modal">
            <button class="modal-close-btn" id="closeResultModal">&times;</button>
            <div class="result-modal-content" id="resultModalContent"></div>
        </div>
    </div>

    <!-- Node Select Modal -->
    <div class="modal-overlay" id="nodeSelectModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="nodeSelectTitle">Pilih Simpul</h3>
                <button class="modal-close-btn" id="closeNodeSelect">&times;</button>
            </div>
            <div class="modal-body" id="nodeSelectBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelNodeSelect">Batal</button>
                <button class="btn btn-primary" id="confirmNodeSelect">Konfirmasi</button>
            </div>
        </div>
    </div>

    <input type="file" id="txtFileInput" accept=".txt" style="display: none;">

    <script src="graph.js"></script>
    <script src="three-view.js"></script>
    <script src="ui.js"></script>
</body>
</html>
