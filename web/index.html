<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualizer - Teori Graf</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <circle cx="8" cy="8" r="4" fill="currentColor"/>
                <circle cx="24" cy="8" r="4" fill="currentColor"/>
                <circle cx="16" cy="24" r="4" fill="currentColor"/>
                <line x1="8" y1="8" x2="24" y2="8" stroke="currentColor" stroke-width="2"/>
                <line x1="8" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="2"/>
                <line x1="24" y1="8" x2="16" y2="24" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Teori Graf Visualizer</span>
        </div>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab active">
                <span class="tab-icon">📊</span>
                Graf Visualizer
            </a>
            <a href="islands.html" class="nav-tab">
                <span class="tab-icon">🏝️</span>
                Island Counter
            </a>
        </div>
        <div class="nav-info">
            <span>Tugas Teori Graf</span>
            <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="Aktifkan dark mode" title="Aktifkan dark mode">
                <span class="theme-text">Dark Mode</span>
            </button>
        </div>
    </nav>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Graph Type -->
            <div class="panel">
                <h3>Tipe Graf</h3>
                <div class="toggle-container">
                    <button id="undirectedBtn" class="toggle-btn active">Undirected</button>
                    <button id="directedBtn" class="toggle-btn">Directed</button>
                </div>
            </div>

            <!-- Tools -->
            <div class="panel">
                <h3>Tools</h3>
                <div class="tools-grid">
                    <button id="addNodeTool" class="tool-btn active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="8"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <span>Simpul</span>
                    </button>
                    <button id="addEdgeTool" class="tool-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="5" x2="19" y2="19"/>
                            <circle cx="5" cy="5" r="3"/>
                            <circle cx="19" cy="19" r="3"/>
                        </svg>
                        <span>Sisi</span>
                    </button>
                    <button id="moveTool" class="tool-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>
                        </svg>
                        <span>Pindah</span>
                    </button>
                    <button id="deleteTool" class="tool-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                        <span>Hapus</span>
                    </button>
                </div>
            </div>

            <!-- Operations -->
            <div class="panel">
                <h3>Operasi Graf</h3>
                <div class="operations-list">
                    <button id="opDFS" class="op-btn">
                        <span class="op-icon">🔍</span>DFS Traversal
                    </button>
                    <button id="opBFS" class="op-btn">
                        <span class="op-icon">🌊</span>BFS Traversal
                    </button>
                    <button id="opDistance" class="op-btn">
                        <span class="op-icon">📏</span>Jarak Antar Simpul
                    </button>
                    <button id="opConnected" class="op-btn">
                        <span class="op-icon">🔗</span>Cek Keterhubungan
                    </button>
                    <button id="opComponentSize" class="op-btn">
                        <span class="op-icon">📐</span>Ukuran Komponen
                    </button>
                    <button id="opCountComponents" class="op-btn">
                        <span class="op-icon">#️⃣</span>Jumlah Komponen
                    </button>
                    <button id="opLargestComponent" class="op-btn">
                        <span class="op-icon">🏆</span>Komponen Terbesar
                    </button>
                </div>
            </div>

            <!-- Actions -->
            <div class="panel">
                <h3>Aksi</h3>
                <div class="action-buttons">
                    <button id="clearGraph" class="action-btn danger">🗑️ Hapus Semua</button>
                    <button id="resetColors" class="action-btn">🔄 Reset Warna</button>
                    <button id="exportGraph" class="action-btn">📤 Export</button>
                    <button id="importGraph" class="action-btn">📥 Import</button>
                </div>
            </div>

            <!-- Speed Control -->
            <div class="panel">
                <h3>Kecepatan Animasi</h3>
                <div class="speed-control">
                    <input type="range" id="speedSlider" min="100" max="2000" value="500" step="100">
                    <div class="speed-labels">
                        <span>Cepat</span>
                        <span id="speedValue">500ms</span>
                        <span>Lambat</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="graph-info">
                    <div class="info-item">
                        <span class="info-label">Simpul:</span>
                        <span id="nodeCount" class="info-value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Sisi:</span>
                        <span id="edgeCount" class="info-value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Mode:</span>
                        <span id="currentMode" class="info-value">Tambah Simpul</span>
                    </div>
                </div>
                
                <!-- View Toggle -->
                <div class="view-toggle-container">
                    <button id="view2DBtn" class="view-toggle-btn active">
                        <span class="toggle-icon">📊</span>
                        <span>2D View</span>
                    </button>
                    <button id="view3DBtn" class="view-toggle-btn">
                        <span class="toggle-icon">🌐</span>
                        <span>3D View</span>
                    </button>
                </div>
            </div>

            <div class="canvas-container" id="canvasContainer">
                <!-- 2D Canvas -->
                <canvas id="graphCanvas"></canvas>
                
                <!-- 3D Container (inline, not modal) -->
                <div class="canvas-3d-container" id="canvas3DContainer">
                    <div id="threejs-inline-container"></div>
                    
                    <!-- 3D Controls -->
                    <div class="view-3d-controls">
                        <button class="control-btn" id="resetCamera3D" title="Reset Camera">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 4v6h6M23 20v-6h-6"/>
                                <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                            </svg>
                        </button>
                        <button class="control-btn active" id="toggleAutoRotate3D" title="Auto Rotate">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12a9 9 0 11-6.219-8.56"/>
                            </svg>
                        </button>
                        <button class="control-btn" id="toggleWireframe3D" title="Wireframe">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- 3D Info -->
                    <div class="view-3d-info-inline">
                        <p>🖱️ <strong>Drag</strong> untuk memutar</p>
                        <p>🔍 <strong>Scroll</strong> untuk zoom</p>
                        <p>➡️ <strong>Right-click</strong> untuk pan</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="result-modal">
            <button class="modal-close-btn" id="closeResultModal">&times;</button>
            <div class="result-modal-content" id="resultModalContent"></div>
        </div>
    </div>

    <!-- Node Select Modal -->
    <div class="modal-overlay" id="nodeSelectModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="nodeSelectTitle">Pilih Simpul</h3>
                <button class="modal-close-btn" id="closeNodeSelect">&times;</button>
            </div>
            <div class="modal-body" id="nodeSelectBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelNodeSelect">Batal</button>
                <button class="btn btn-primary" id="confirmNodeSelect">Konfirmasi</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script src="graph.js"></script>
    <script src="three-view.js"></script>
    <script src="ui.js"></script>
</body>
</html>
